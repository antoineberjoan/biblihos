# Biblihos — Schéma de validation SCPI
# Format : JSON Schema Draft 2020-12 en syntaxe YAML
# Valide chaque fichier data/scpi/<societe>/<fonds>.yaml (un fonds par fichier)

$schema: https://json-schema.org/draft/2020-12/schema
title: Scpi
description: Données d'une SCPI ou SCI — un fichier par véhicule
type: object
required:
  - nom
  - societeGestion
  - type
  - isin
  - dateCreation
  - creation
  - capitalisation
  - capitalVariable
  - strategie
  - risque
  - sfdr
  - isr
  - labelIsr
  - versement
  - versementProgramme
  - delaiJouissance
  - url
  - fraisSouscription
  - fraisGestion
  - fraisAcquisition
  - fraisRevente
  - fraisTravaux
  - prixSouscription
  - prixRetrait
  - valeurReconstitution
  - minimumSouscription
  - pga
  - td
  - tof
  - top
  - nombreActifs
  - nombreLocataires
  - walb
  - endettement
  - associes
  - repartitionGeographique
  - repartitionSectorielle
  - liquidite
  - souscriptions
  - retraits
  - ran
  - demembrement
  - historique
  - documents
additionalProperties: false

$defs:
  # Valeur numérique ou tiret cadratin ("—")
  NullableNumber:
    oneOf:
      - type: number
      - const: "—"

  # Chaîne de caractères — le tiret cadratin "—" est la valeur sentinelle conventionnelle
  NullableString:
    type: string

  # Pourcentage en décimale [0-1] ou tiret cadratin
  Pourcentage:
    oneOf:
      - type: number
        minimum: 0
        maximum: 1
      - const: "—"

  # Document officiel avec URL et date
  Document:
    type: object
    required: [url, date]
    additionalProperties: false
    properties:
      url:
        $ref: "#/$defs/NullableString"
      date:
        $ref: "#/$defs/NullableString"

  # Entrée d'historique annuel
  HistoriqueAnnee:
    type: object
    required: [prixSouscription, td]
    additionalProperties: false
    properties:
      prixSouscription:
        $ref: "#/$defs/NullableNumber"
      td:
        $ref: "#/$defs/NullableNumber"

properties:
  nom:
    type: string
  societeGestion:
    type: string
  type:
    enum: [SCPI, SCI]
  isin:
    $ref: "#/$defs/NullableString"
  dateCreation:
    $ref: "#/$defs/NullableString"
  creation:
    oneOf:
      - type: integer
        minimum: 1900
        maximum: 2100
      - const: "—"
  capitalisation:
    $ref: "#/$defs/NullableString"
  capitalVariable:
    type: boolean
  strategie:
    type: string
  risque:
    oneOf:
      - type: integer
        minimum: 1
        maximum: 7
      - const: "—"
  sfdr:
    oneOf:
      - enum: ["Article 6", "Article 8", "Article 9"]
      - const: "—"
  isr:
    type: boolean
  labelIsr:
    $ref: "#/$defs/NullableString"
  versement:
    $ref: "#/$defs/NullableString"
  versementProgramme:
    type: boolean
  delaiJouissance:
    $ref: "#/$defs/NullableString"
  url:
    $ref: "#/$defs/NullableString"

  # Frais
  fraisSouscription:
    $ref: "#/$defs/Pourcentage"
  fraisGestion:
    $ref: "#/$defs/Pourcentage"
  fraisAcquisition:
    $ref: "#/$defs/Pourcentage"
  fraisRevente:
    $ref: "#/$defs/Pourcentage"
  fraisTravaux:
    $ref: "#/$defs/Pourcentage"

  # Prix
  prixSouscription:
    $ref: "#/$defs/NullableNumber"
  prixRetrait:
    $ref: "#/$defs/NullableNumber"
  valeurReconstitution:
    $ref: "#/$defs/NullableNumber"
  minimumSouscription:
    $ref: "#/$defs/NullableNumber"
  pga:
    $ref: "#/$defs/NullableNumber"

  # Performance : clés = années en string ("2024"), valeurs = NullableNumber
  td:
    type: object
    additionalProperties:
      $ref: "#/$defs/NullableNumber"

  # Patrimoine
  tof:
    $ref: "#/$defs/Pourcentage"
  top:
    $ref: "#/$defs/Pourcentage"
  nombreActifs:
    $ref: "#/$defs/NullableNumber"
  nombreLocataires:
    $ref: "#/$defs/NullableNumber"
  walb:
    $ref: "#/$defs/NullableNumber"
  endettement:
    $ref: "#/$defs/Pourcentage"
  associes:
    $ref: "#/$defs/NullableNumber"

  # Répartition : clés libres (pays/secteur), valeurs = number [0-1] ou "—"
  repartitionGeographique:
    type: object
    additionalProperties:
      oneOf:
        - type: number
          minimum: 0
          maximum: 1
        - const: "—"
  repartitionSectorielle:
    type: object
    additionalProperties:
      oneOf:
        - type: number
          minimum: 0
          maximum: 1
        - const: "—"

  # Liquidité
  liquidite:
    $ref: "#/$defs/NullableString"
  souscriptions:
    $ref: "#/$defs/NullableNumber"
  retraits:
    $ref: "#/$defs/NullableNumber"
  ran:
    $ref: "#/$defs/NullableNumber"

  # Démembrement : clés = durées en string ("5", "10"), valeurs = NP en décimale
  demembrement:
    type: object
    additionalProperties:
      $ref: "#/$defs/Pourcentage"

  # Historique : clés = années en string ("2024")
  historique:
    type: object
    additionalProperties:
      $ref: "#/$defs/HistoriqueAnnee"

  # Documents officiels
  documents:
    type: object
    required: [dic, rapportAnnuel, bulletinTrimestriel, noteInformations]
    additionalProperties: false
    properties:
      dic:
        $ref: "#/$defs/Document"
      rapportAnnuel:
        $ref: "#/$defs/Document"
      bulletinTrimestriel:
        $ref: "#/$defs/Document"
      noteInformations:
        $ref: "#/$defs/Document"
