# Biblihos — Schéma régimes retraite fonctionnaires (SRE, CNRACL) et assimilés (MSA, CRPCEN)
$schema: https://json-schema.org/draft/2020-12/schema
title: RetraiteFonctionnaire
type: object
required: [nom, organisme, profession, sourceUrl, dateMiseAJour]
additionalProperties: true
properties:
  nom:
    type: string
  organisme:
    type: string
  profession:
    type: string
  sourceUrl:
    type: string
  dateMiseAJour:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  type:
    type: string
  taux_maximum:
    type: number
  cotisations:
    type: object
    additionalProperties: true
  generations:
    type: array
