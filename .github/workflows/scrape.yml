name: Validate & Scrape

on:
  push:
    paths:
      - "data/**"
      - "schemas/**"
  pull_request:
    paths:
      - "data/**"
      - "schemas/**"
  schedule:
    # Tous les lundis à 8h UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  validate:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate Retraite — salariés privé
        run: python scripts/validate.py schemas/retraite.yaml data/retraite/salarie-prive/

      - name: Validate Retraite — fonctionnaires
        run: python scripts/validate.py schemas/retraite_fonctionnaire.yaml data/retraite/fonctionnaire/

      - name: Validate Retraite — libéraux
        run: python scripts/validate.py schemas/retraite_liberal.yaml data/retraite/liberal/

      - name: Validate Retraite — autres régimes
        run: python scripts/validate.py schemas/retraite_fonctionnaire.yaml data/retraite/autre/

  scrape:
    name: Scrape fresh data
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[scrape]"

      - name: Install Playwright browsers
        run: scrapling install

      - name: Scrape Retraite
        run: python -m scrapers.retraite

      - name: Commit changes if any
        run: |
          git config user.name "biblihos-bot"
          git config user.email "bot@biblihos.dev"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update data $(date +%Y-%m-%d)"
          git push
