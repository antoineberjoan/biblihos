# Biblihos — Retraite : Agirc-Arrco (complémentaire salariés privé)
# Source : agirc-arrco.fr, ANI 17/11/2017
# Dernière mise à jour : 2026-04-10

nom: Agirc-Arrco
organisme: Agirc-Arrco
type: complementaire                   # base | complementaire
sourceUrl: https://www.agirc-arrco.fr/nous-connaitre/nos-etudes-et-publications/documentation-institutionnelle/parametres-et-donnees-statistiques/
dateMiseAJour: "2026-04-10"

# ── Taux de cotisation ────────────────────────────────────────────────
# ANI 17/11/2017, en vigueur depuis 01/01/2019
# tauxAppel : seuls 100/127 des cotisations génèrent des points
tauxCotisation:
  tranche1: 0.0620                     # jusqu'au PASS
  tranche2: 0.1700                     # de 1× à 8× PASS
  tauxAppel: 1.27                      # taux d'appel — 127 %
  plafondTranche2: 8                   # multiple du PASS

# ── Réversion ─────────────────────────────────────────────────────────
# ANI 30/10/2015
reversion:
  taux: 0.60
  ageMinimum: "—"                      # pas de condition d'âge
  conditionRessources: false

# ── Majoration enfants ────────────────────────────────────────────────
majoration:
  tauxEnfantsNes: 0.10                 # +10 % pour 3 enfants nés ou élevés
  tauxEnfantCharge: 0.05               # +5 % par enfant encore à charge

